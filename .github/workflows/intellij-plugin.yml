name: IntelliJ Plugin

on:
  push:
    paths:
      - "editors/intellij/**"
      - ".github/workflows/intellij-plugin.yml"
    branches: [main]
    tags:
      - "intellij-v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

defaults:
  run:
    working-directory: editors/intellij

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            plugin:
              - 'editors/intellij/**'
              - '.github/workflows/intellij-plugin.yml'

  build:
    name: Build & Test
    needs: [changes]
    if: needs.changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test

      - name: Package plugin
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: konvoy-intellij
          path: editors/intellij/build/distributions/*.zip

  verify:
    name: Verify Compatibility
    if: startsWith(github.ref, 'refs/tags/intellij-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify plugin
        run: ./gradlew verifyPlugin

  release:
    name: Attach to Release
    needs: [build, verify]
    if: startsWith(github.ref, 'refs/tags/intellij-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: konvoy-intellij

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"

  # Single gate job for branch protection. Passes when build succeeds or
  # is skipped (no IntelliJ changes). Use this as the required check
  # instead of "Build & Test" directly.
  intellij-pass:
    name: IntelliJ Pass
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Verify build passed or was skipped
        run: |
          result="${{ needs.build.result }}"
          if [[ "$result" != "success" && "$result" != "skipped" ]]; then
            echo "Build & Test failed with result: $result"
            exit 1
          fi
          echo "IntelliJ Plugin check passed or was skipped."
