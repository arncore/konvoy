name: IntelliJ Plugin

on:
  push:
    paths:
      - "editors/intellij/**"
      - ".github/workflows/intellij-plugin.yml"
    branches: [main]
    tags:
      - "intellij-v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_filter:
        description: "Gradle test filter, e.g. '*Codegen*' or 'com.konvoy.ide.toml.*' (empty runs all tests)"
        required: false
        default: ""

permissions:
  contents: read

defaults:
  run:
    working-directory: editors/intellij

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    outputs:
      plugin: ${{ steps.filter.outputs.plugin }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            plugin:
              - 'editors/intellij/**'
              - '.github/workflows/intellij-plugin.yml'

  build:
    name: Build & Test
    needs: [changes]
    if: startsWith(github.ref, 'refs/tags/intellij-v') || needs.changes.outputs.plugin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Test
        run: ./gradlew test

      - name: Package plugin
        run: ./gradlew buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: konvoy-intellij
          path: editors/intellij/build/distributions/*.zip

  # Fast, on-demand iteration: compile the plugin and run only the matching tests.
  # `gh workflow run intellij-plugin.yml --ref <branch> -f test_filter='*Codegen*'`.
  # Compilation still runs in full (so this catches build errors), but the (slow,
  # IDE-spinning) test suite is narrowed to the filter. PRs still run the full suite.
  quick-test:
    name: Quick Test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Test (filtered)
        run: |
          filter='${{ github.event.inputs.test_filter }}'
          if [ -n "$filter" ]; then
            echo "Running tests matching: $filter"
            ./gradlew test --tests "$filter"
          else
            echo "No filter provided — running all tests"
            ./gradlew test
          fi

  verify:
    name: Verify Compatibility
    if: startsWith(github.ref, 'refs/tags/intellij-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify plugin
        run: ./gradlew verifyPlugin

  release:
    name: Attach to Release
    needs: [build, verify]
    if: startsWith(github.ref, 'refs/tags/intellij-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: konvoy-intellij

      - name: Generate release notes
        working-directory: .
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/release-notes.mjs --stream intellij --output release-notes.md

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: "*.zip"

  # Single gate job for branch protection. Passes when build succeeds or
  # is skipped (no IntelliJ changes). Use this as the required check
  # instead of "Build & Test" directly.
  intellij-pass:
    name: IntelliJ Pass
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Verify build passed or was skipped
        run: |
          result="${{ needs.build.result }}"
          if [[ "$result" != "success" && "$result" != "skipped" ]]; then
            echo "Build & Test failed with result: $result"
            exit 1
          fi
          echo "IntelliJ Plugin check passed or was skipped."
